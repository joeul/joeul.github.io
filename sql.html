---
layout: default
permalink: /sql.html
---

<div class="home">
  {%- if site.sql.size > 0 -%}
    <h2 class="post-list-heading">{{ page.title | default: "Posts" }}</h2>
    <ul class="post-list">
      {%- for sql in site.sql -%}
      <li>
        
        <div class="post-container">
            <h3>
                <a class="post-link" href="{{ sql.url | relative_url }}">
                    {{ sql.title | escape }}
                </a>
            </h3>
            <span class="post-meta">{{ sql.lesson | escape }}</span>
        </div>

      </li>
      {%- endfor -%}
    </ul>

  {%- endif -%}

</div>
